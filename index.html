<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#1A2421;
    --paper:#F4F1EA;
    --surface:#FFFFFF;
    --accent:#1D7A66;
    --accent-dark:#0F5346;
    --muted:#6B736F;
    --line:rgba(26,36,33,.12);
    --line-strong:rgba(26,36,33,.22);
    --danger:#B23B3B;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ---- Login ---- */
  .card{
    width:100%;
    max-width:380px;
    background:var(--surface);
    border:.5px solid var(--line);
    border-radius:var(--radius);
    padding:36px 32px 32px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin-bottom:14px;
  }
  .wordmark{
    font-family:"Fraunces",Georgia,serif;
    font-size:34px;
    font-weight:500;
    line-height:1.05;
    letter-spacing:-.01em;
    margin-bottom:6px;
  }
  .subtitle{
    font-size:14px;
    color:var(--muted);
    margin-bottom:28px;
  }
  label{
    display:block;
    font-size:13px;
    font-weight:500;
    margin-bottom:8px;
  }
  .field{position:relative}
  input[type="password"],input[type="text"]{
    width:100%;
    height:46px;
    padding:0 70px 0 14px;
    font-size:15px;
    font-family:inherit;
    color:var(--ink);
    background:var(--paper);
    border:1px solid var(--line-strong);
    border-radius:10px;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(29,122,102,.16);
  }
  .toggle{
    position:absolute;
    right:6px;top:50%;
    transform:translateY(-50%);
    width:auto;min-width:36px;height:36px;padding:0 8px;
    border:none;background:none;
    color:var(--muted);
    cursor:pointer;
    font-size:13px;font-weight:500;
    border-radius:8px;
  }
  .toggle:hover{color:var(--ink)}
  button.primary{
    width:100%;
    height:46px;
    margin-top:20px;
    font-family:inherit;
    font-size:15px;
    font-weight:600;
    color:#fff;
    background:var(--accent);
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:background .15s, transform .05s;
  }
  button.primary:hover{background:var(--accent-dark)}
  button.primary:active{transform:scale(.99)}
  button.primary:disabled{opacity:.6;cursor:default}
  .status{
    min-height:20px;
    margin-top:16px;
    font-size:13px;
    text-align:center;
  }
  .status.error{color:var(--danger)}
  .status.loading{color:var(--muted)}

  /* ---- Panel (placeholder con verificacion de datos) ---- */
  .panel{
    width:100%;
    max-width:540px;
    background:var(--surface);
    border:.5px solid var(--line);
    border-radius:var(--radius);
    padding:36px 32px;
  }
  .panel .check{
    width:48px;height:48px;
    border-radius:50%;
    background:rgba(29,122,102,.12);
    color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:600;
    margin-bottom:20px;
  }
  .panel h1{
    font-family:"Fraunces",Georgia,serif;
    font-size:26px;font-weight:500;
    margin-bottom:8px;
  }
  .panel p{font-size:14px;color:var(--muted);margin-bottom:6px}
  .stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:24px;
  }
  .stat{
    background:var(--paper);
    border-radius:10px;
    padding:16px 12px;
    text-align:center;
  }
  .stat .num{
    font-family:"Fraunces",Georgia,serif;
    font-size:28px;font-weight:500;
    line-height:1;
  }
  .stat .lbl{
    font-size:12px;color:var(--muted);
    margin-top:6px;
  }
  .panel .meta{
    margin-top:22px;padding-top:18px;
    border-top:.5px solid var(--line);
    font-size:13px;color:var(--muted);
  }
  button.ghost{
    margin-top:24px;
    height:40px;padding:0 18px;
    font-family:inherit;font-size:14px;font-weight:500;
    color:var(--ink);
    background:transparent;
    border:1px solid var(--line-strong);
    border-radius:10px;cursor:pointer;
  }
  button.ghost:hover{background:var(--paper)}
  .hidden{display:none}
</style>
</head>
<body>

  <!-- ===== Pantalla de login ===== -->
  <section class="card" id="login">
    <div class="eyebrow">Panel privado</div>
    <div class="wordmark">Finanzas</div>
    <div class="subtitle">Escribe tu frase de acceso para continuar.</div>

    <label for="clave">Frase de acceso</label>
    <div class="field">
      <input type="password" id="clave" autocomplete="off" spellcheck="false" placeholder="••••••••••••" />
      <button class="toggle" id="toggle" type="button" aria-label="Mostrar u ocultar la frase">Ver</button>
    </div>

    <button class="primary" id="btnEntrar">Entrar</button>
    <div class="status" id="status"></div>
  </section>

  <!-- ===== Panel tras autenticar (verificacion de datos) ===== -->
  <section class="panel hidden" id="panel">
    <div class="check">&check;</div>
    <h1>Datos conectados</h1>
    <p id="panelMsg">Leí tu Sheet correctamente.</p>

    <div class="stats">
      <div class="stat"><div class="num" id="nMov">0</div><div class="lbl">movimientos</div></div>
      <div class="stat"><div class="num" id="nTar">0</div><div class="lbl">tarjetas</div></div>
      <div class="stat"><div class="num" id="nPos">0</div><div class="lbl">lugares</div></div>
    </div>

    <div class="meta">
      La tubería completa funciona: GitHub Pages → frase → Apps Script → tu Sheet. El siguiente paso es construir el tab <strong>Finanzas</strong> con estos datos.
    </div>
    <button class="ghost" id="btnSalir">Salir</button>
  </section>

<script>
  // ===== Configuración =====
  const ENDPOINT = "https://script.google.com/macros/s/AKfycbwR9QnCagqVkxsLkg_ntojXqd9FLDzbvmtCp1htATCTRvxyZ19W1BphkEXzdz_MOJwa/exec";

  let claveEnMemoria = null; // se borra al recargar
  let DATOS = null;          // aquí quedan las hojas leídas, para la siguiente fase

  const $ = (id) => document.getElementById(id);
  const inputClave = $("clave");
  const status = $("status");

  function setStatus(texto, tipo){
    status.textContent = texto || "";
    status.className = "status" + (tipo ? " " + tipo : "");
  }

  // cuenta filas de datos de una hoja (resta el encabezado)
  function filas(hoja){
    if(!hoja || !hoja.length) return 0;
    return Math.max(0, hoja.length - 1);
  }

  $("toggle").addEventListener("click", () => {
    const ver = inputClave.type === "password";
    inputClave.type = ver ? "text" : "password";
    $("toggle").textContent = ver ? "Ocultar" : "Ver";
    inputClave.focus();
  });

  async function entrar(){
    const frase = inputClave.value.trim();
    if(!frase){ setStatus("Escribe tu frase de acceso.", "error"); inputClave.focus(); return; }

    $("btnEntrar").disabled = true;
    setStatus("Verificando y leyendo tus datos...", "loading");

    try{
      const resp = await fetch(ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ clave: frase })
      });
      const data = await resp.json();

      if(data && data.ok){
        claveEnMemoria = frase;
        DATOS = data.hojas || {};

        $("nMov").textContent = filas(DATOS.Movimientos);
        $("nTar").textContent = filas(DATOS.Tarjetas);
        $("nPos").textContent = filas(DATOS.Posicion);

        $("login").classList.add("hidden");
        $("panel").classList.remove("hidden");
      } else {
        setStatus("Frase incorrecta. Intenta de nuevo.", "error");
      }
    } catch(err){
      setStatus("No se pudo conectar. Revisa el endpoint y que el redespliegue sea versión nueva.", "error");
    } finally {
      $("btnEntrar").disabled = false;
    }
  }

  function salir(){
    claveEnMemoria = null;
    DATOS = null;
    inputClave.value = "";
    setStatus("", "");
    $("panel").classList.add("hidden");
    $("login").classList.remove("hidden");
    inputClave.focus();
  }

  $("btnEntrar").addEventListener("click", entrar);
  inputClave.addEventListener("keydown", (e) => { if(e.key === "Enter") entrar(); });
  $("btnSalir").addEventListener("click", salir);
</script>
</body>
</html>
